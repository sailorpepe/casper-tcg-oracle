name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (Odra contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install nightly-2026-01-01 --profile minimal --component rustfmt clippy
          rustup override set nightly-2026-01-01

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Build (library)
        run: cargo build --lib --verbose

      - name: Unit tests (Odra mock backend)
        run: cargo test --lib --verbose
